name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }} via uv
        run: uv python install ${{ matrix.python-version }}

      - name: Install dev extras
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Lint
        run: uv run ruff check src tests

      - name: Type check
        run: uv run pyright src tests

      - name: Test
        run: uv run pytest --cov=cumulant_residual_cert --cov-report=term-missing

  adapters-and-docs:
    name: Adapter extras + docs build (Ubuntu, Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12 via uv
        run: uv python install 3.12

      - name: Install with all extras and docs
        run: uv sync --python 3.12 --extra all --extra dev --extra docs

      - name: Run adapter tests
        run: uv run pytest tests/test_adapters.py -v

      - name: Build docs
        run: uv run mkdocs build --strict

  golden-sync:
    name: Golden-sync against audit repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned audit commit
        id: audit_pin
        run: |
          sha=$(cat AUDIT_COMMIT | tr -d '[:space:]')
          if ! [[ "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "AUDIT_COMMIT must contain a 40-character lowercase hex SHA; got: $sha" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout audit repo at pinned SHA
        uses: actions/checkout@v4
        with:
          repository: kootru-repo/charge-filtered-cumulant-residuals
          path: _audit
          ref: ${{ steps.audit_pin.outputs.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python 3.12 via uv
        run: uv python install 3.12

      - name: Install
        run: uv sync --python 3.12 --extra dev

      - name: Run sync test
        env:
          AUDIT_REPO_PATH: ${{ github.workspace }}/_audit
        run: uv run pytest tests/test_golden_sync.py -v

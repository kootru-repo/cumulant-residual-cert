name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check src tests

      - name: Type check
        run: |
          pyright src tests

      - name: Test
        run: |
          pytest --cov=cumulant_residual_cert --cov-report=term-missing

  adapters-and-docs:
    name: Adapter extras + docs build (Ubuntu, Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install with all extras and docs
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev,docs]"

      - name: Run adapter tests
        run: |
          pytest tests/test_adapters.py -v

      - name: Build docs
        run: |
          mkdocs build --strict

  golden-sync:
    name: Golden-sync against audit repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned audit commit
        id: audit_pin
        run: |
          sha=$(cat AUDIT_COMMIT | tr -d '[:space:]')
          if ! [[ "$sha" =~ ^[0-9a-f]{40}$ ]]; then
            echo "AUDIT_COMMIT must contain a 40-character lowercase hex SHA; got: $sha" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout audit repo at pinned SHA
        uses: actions/checkout@v4
        with:
          repository: kootru-repo/charge-filtered-cumulant-residuals
          path: _audit
          ref: ${{ steps.audit_pin.outputs.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          pip install -e ".[dev]"

      - name: Run sync test
        env:
          AUDIT_REPO_PATH: ${{ github.workspace }}/_audit
        run: |
          pytest tests/test_golden_sync.py -v
